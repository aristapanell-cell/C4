  server: kubernetes.io
  port: 443
  uuid: AstroVPN-Official
  network: xhttp
  tls: true
  udp: true
  skip-cert-verify: false
  tcp-fast-open: true
  servername: kubernetes.io
  flow: ''
  client-fingerprint: chrome
  packet-encoding: xudp
  alpn:
  - h2
  - http/1.1
