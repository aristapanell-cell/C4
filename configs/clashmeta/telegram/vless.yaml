  tls: true
  udp: true
  skip-cert-verify: false
  tcp-fast-open: true
  servername: cn.8lack.ir
  flow: ''
  client-fingerprint: firefox
  packet-encoding: xudp
  alpn:
  - h2
  - http/1.1
  ws-opts:
    path: /chat?ed=128
    headers:
